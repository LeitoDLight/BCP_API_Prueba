<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Examen BCP - Listado Completo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body class="container">
<h2 class="mt-4">Listado de Locales y Gerentes BCP</h2>

<table class="table table-striped table-bordered mt-3">
    <thead class="thead-dark">
    <tr>
        <th>ID Local</th>
        <th>Nombre Agencia</th>
        <th>Piso (Combo)</th>
        <th>Gerente Asignado (Manager)</th> <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="l : ${locales}">
        <td th:text="${l.localId}"></td>
        <td th:text="${l.name}"></td>
        <td>
            <select class="form-control" disabled>
                <option th:text="${l.floor}" selected></option>
            </select>
        </td>
        <td th:text="${l.manager != null ? l.manager.firstName + ' ' + l.manager.lastName : 'Sin Gerente'}"></td>

        <td>
            <a th:href="@{/locales/editar/{id}(id=${l.localId})}" class="btn btn-sm btn-warning">Editar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
